:root,[data-theme="light"]{
  --bg:#f8f9fb;--bg2:#fff;--bg3:#f1f3f7;
  --c1:#fff;--c2:#f4f5f8;--c3:#eaecf2;
  --b1:#dfe2ea;--b2:#c8cdd8;
  --t1:#1a1d26;--t2:#4a4f5e;--t3:#7c8294;--t4:#a3a8b8;
  --ac:var(--accent,#c2410c);--ac2:var(--accent2,#ea580c);
  --acBg:rgba(194,65,12,.06);--acBg2:rgba(194,65,12,.12);--acBorder:rgba(194,65,12,.2);
  --g:#16a34a;--gBg:rgba(22,163,74,.08);--gBorder:rgba(22,163,74,.2);
  --r:#dc2626;--rBg:rgba(220,38,38,.06);--rBorder:rgba(220,38,38,.2);
  --p:#7c3aed;--pBg:rgba(124,58,237,.06);
  --y:#ca8a04;--yBg:rgba(202,138,4,.06);
  --grad:linear-gradient(135deg,var(--ac),var(--ac2));
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadowMd:0 4px 12px rgba(0,0,0,.08);--shadowLg:0 8px 24px rgba(0,0,0,.1);
  --overlay:rgba(0,0,0,.5);
}
[data-theme="dark"]{
  --bg:#0c0c12;--bg2:#111118;--bg3:#18181f;
  --c1:#16161e;--c2:#1c1c26;--c3:#24242e;
  --b1:#2a2a38;--b2:#3a3a4a;
  --t1:#e4e2ee;--t2:#a8a4b8;--t3:#6e6a80;--t4:#4a4660;
  --acBg:rgba(251,146,60,.08);--acBg2:rgba(251,146,60,.15);--acBorder:rgba(251,146,60,.25);
  --g:#22c55e;--gBg:rgba(34,197,94,.1);--gBorder:rgba(34,197,94,.25);
  --r:#ef4444;--rBg:rgba(239,68,68,.08);--rBorder:rgba(239,68,68,.25);
  --p:#a78bfa;--pBg:rgba(167,139,250,.08);
  --y:#facc15;--yBg:rgba(250,204,21,.08);
  --grad:linear-gradient(135deg,var(--ac),var(--ac2));
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadowMd:0 4px 12px rgba(0,0,0,.4);--shadowLg:0 8px 24px rgba(0,0,0,.5);
  --overlay:rgba(0,0,0,.75);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:var(--fontSize,15px);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
body{max-width:480px;margin:0 auto;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit}
input,textarea{font-family:inherit;background:none;border:none;outline:none;color:var(--t1);font-size:inherit}
.inp{background:var(--c1);border:1.5px solid var(--b1);border-radius:8px;padding:12px 14px;color:var(--t1);width:100%;transition:all .2s;font-size:15px}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acBg)}
.inp::placeholder{color:var(--t4)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.bp{background:var(--grad);color:#fff;box-shadow:var(--shadow)}
.bs{background:var(--c1);border:1.5px solid var(--b1);color:var(--t2)}
.cd{background:var(--c1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);transition:all .2s}
.tag{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(194,65,12,.15)}50%{box-shadow:0 0 40px rgba(194,65,12,.3)}}
@keyframes dot{0%,100%{opacity:.15}50%{opacity:.8}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

<script>
// ════════════════════════════════════

// ── THEME & CUSTOMIZATION ──
function gT(){return localStorage.getItem('ak_theme')||'light'}
function sT(t){localStorage.setItem('ak_theme',t);document.documentElement.setAttribute('data-theme',t);document.querySelector('meta[name=theme-color]').content=t==='dark'?'#0c0c12':'#ffffff'}
sT(gT());

function applyCustom(){
  const a=localStorage.getItem('ak_accent');
  if(a){document.documentElement.style.setProperty('--accent',a);document.documentElement.style.setProperty('--accent2',a)}
  const fs=localStorage.getItem('ak_fontsize');
  if(fs)document.documentElement.style.setProperty('--fontSize',fs+'px');
}
applyCustom();

// ── ENCRYPTION ──
const CR={
  async dk(p){const e=new TextEncoder();const k=await crypto.subtle.importKey('raw',e.encode(p.padEnd(16,'0')),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:e.encode('AAKASH_2024'),iterations:100000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])},
  async en(d,k){const e=new TextEncoder();const iv=crypto.getRandomValues(new Uint8Array(12));const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,e.encode(JSON.stringify(d)));const c=new Uint8Array(iv.length+enc.byteLength);c.set(iv);c.set(new Uint8Array(enc),iv.length);return btoa(String.fromCharCode(...c))},
  async de(b,k){try{const r=Uint8Array.from(atob(b),c=>c.charCodeAt(0));return JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:r.slice(0,12)},k,r.slice(12))))}catch{return null}}
};
let _ck=null;
const EDB={async save(k,v){if(!_ck)return;localStorage.setItem('ak_'+k,await CR.en(v,_ck))},async load(k){if(!_ck)return null;const r=localStorage.getItem('ak_'+k);return r?CR.de(r,_ck):null}};

// ── STATE ──
let S={chat:[],entries:[],notes:[],finance:{salary:0,expenses:[]},habits:[],habitLog:{},apiKey:'',elKey:'',voiceMood:'rachel',thinkMode:false,memoryFacts:[],customRules:[],hiddenTabs:[]};
let tab='chat',loading=false,mc=0;

// ── TOOLS ──
const TOOLS=[
  {name:'add_expense',description:'Add expense when user mentions spending/buying/paying money.',input_schema:{type:'object',properties:{amount:{type:'number'},category:{type:'string',enum:['Food','Transport','Rent','Shopping','Bills','Health','Education','Entertainment','Investment','Savings','Other']},description:{type:'string'}},required:['amount','category']}},
  {name:'create_task',description:'Create task when user mentions a todo/reminder.',input_schema:{type:'object',properties:{title:{type:'string'},priority:{type:'string',enum:['low','medium','high']}},required:['title']}},
  {name:'log_habit',description:'Mark habit done when user says they completed one.',input_schema:{type:'object',properties:{habit_name:{type:'string'}},required:['habit_name']}},
  {name:'create_note',description:'Save a note when user wants to remember something.',input_schema:{type:'object',properties:{title:{type:'string'},content:{type:'string'},folder:{type:'string',enum:['Course Notes','Work Notes','Personal','AI/ML','Python','Business','Finance','General']}},required:['title','content']}},
  {name:'set_goal',description:'Create goal when user mentions ambition/target.',input_schema:{type:'object',properties:{title:{type:'string'},deadline:{type:'string'}},required:['title']}},
  {name:'get_finance_summary',description:'Get financial summary when user asks about money.',input_schema:{type:'object',properties:{}}},
  {name:'get_habits_status',description:'Get habit status when user asks.',input_schema:{type:'object',properties:{}}},
  {name:'remember_fact',description:'Remember important personal fact about user.',input_schema:{type:'object',properties:{fact:{type:'string'}},required:['fact']}},
  {name:'customize_app',description:'When user asks to change/customize the app. Ask 2-3 questions first, get approval, then apply.',input_schema:{type:'object',properties:{action:{type:'string',enum:['change_theme','change_accent','change_fontsize','hide_tab','show_tab','add_rule','remove_rule']},value:{type:'string',description:'The value to set'}},required:['action','value']}}
];

function executeTool(name,input){
  const today=td();
  switch(name){
    case 'add_expense':S.finance.expenses.push({id:Date.now(),amount:input.amount,cat:input.category,desc:input.description||'',date:new Date().toISOString()});saveAll();return`✅ ₹${input.amount} ${input.category} added.`;
    case 'create_task':S.entries.unshift({id:Date.now(),type:'task',title:input.title,content:input.priority||'medium',done:false,createdAt:new Date().toISOString()});saveAll();return`✅ Task "${input.title}" created.`;
    case 'log_habit':const h=S.habits.find(x=>x.name.toLowerCase().includes(input.habit_name.toLowerCase()));if(h){if(!S.habitLog[today])S.habitLog[today]=[];if(!S.habitLog[today].includes(h.id)){S.habitLog[today].push(h.id);saveAll()}return`✅ "${h.name}" done!`}return`❌ "${input.habit_name}" not found.`;
    case 'create_note':S.notes.unshift({id:Date.now(),title:input.title,content:input.content,folder:input.folder||'General',createdAt:new Date().toISOString()});saveAll();return`✅ Note saved.`;
    case 'set_goal':S.entries.unshift({id:Date.now(),type:'goal',title:input.title,content:input.deadline||'',done:false,createdAt:new Date().toISOString()});saveAll();return`✅ Goal set: "${input.title}"`;
    case 'get_finance_summary':const tot=S.finance.expenses.reduce((s,e)=>s+e.amount,0);const bc={};S.finance.expenses.forEach(e=>{bc[e.cat]=(bc[e.cat]||0)+e.amount});return`Salary:₹${S.finance.salary||'Not set'}|Spent:₹${tot}|Left:₹${(S.finance.salary||0)-tot}\n${Object.entries(bc).map(([k,v])=>`${k}:₹${v}`).join(', ')}`;
    case 'get_habits_status':const dn=S.habitLog[today]||[];return`${dn.length}/${S.habits.length} done.\n${S.habits.map(h=>`${dn.includes(h.id)?'✅':'⬜'} ${h.name}`).join('\n')}`;
    case 'remember_fact':if(!S.memoryFacts)S.memoryFacts=[];S.memoryFacts.push({fact:input.fact,date:new Date().toISOString()});saveAll();return`🧠 Remembered.`;
    case 'customize_app':return applyCustomization(input.action,input.value);
    default:return'❌ Unknown.';
  }
}

function applyCustomization(action,value){
  switch(action){
    case 'change_theme':sT(value==='dark'?'dark':'light');return`✅ Theme changed to ${value}.`;
    case 'change_accent':localStorage.setItem('ak_accent',value);applyCustom();return`✅ Accent color changed to ${value}.`;
    case 'change_fontsize':localStorage.setItem('ak_fontsize',value);applyCustom();return`✅ Font size changed to ${value}px.`;
    case 'hide_tab':if(!S.hiddenTabs.includes(value)){S.hiddenTabs.push(value);saveAll()}return`✅ ${value} tab hidden.`;
    case 'show_tab':S.hiddenTabs=S.hiddenTabs.filter(t=>t!==value);saveAll();return`✅ ${value} tab visible again.`;
    case 'add_rule':if(!S.customRules)S.customRules=[];S.customRules.push(value);saveAll();return`✅ Custom rule added: "${value}"`;
    case 'remove_rule':S.customRules=(S.customRules||[]).filter(r=>!r.toLowerCase().includes(value.toLowerCase()));saveAll();return`✅ Rule removed.`;
    default:return'❌ Unknown customization.';
  }
}

// ── STORAGE ──
function getStorageSize(){let t=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('ak_'))t+=localStorage.getItem(k).length*2}return t}
function formatBytes(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function autoCompress(){if(S.chat.length>50)S.chat=S.chat.slice(-50);const cut=new Date();cut.setDate(cut.getDate()-90);const cs=cut.toISOString().slice(0,10);Object.keys(S.habitLog).forEach(d=>{if(d<cs)delete S.habitLog[d]});if(S.memoryFacts?.length>50)S.memoryFacts=S.memoryFacts.slice(-50)}
async function saveAll(){autoCompress();await EDB.save('data',S)}
async function loadAll(){const d=await EDB.load('data');if(d){S={...S,...d};mc=S.chat.filter(m=>m.role==='user').length}}
async function hashPin(p){const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+'AAKASH'));return btoa(String.fromCharCode(...new Uint8Array(h)))}

// ── AI ──
const SOUL=`You are AAKASH AI — a brilliant personal AI assistant. You are NOT Claude, NOT any other AI. You are AAKASH — the user's best friend, mentor, teacher, financial advisor, and life coach.

Style: Hinglish. "aap/aapka". Caring, direct, no fluff.

TOOLS — USE THEM PROACTIVELY:
- "₹200 chai" → add_expense
- "remind me" → create_task  
- "meditation done" → log_habit

CUSTOMIZATION — When user says "change theme/color/font/hide tab/add rule":

NOTES/STUDY TEACHER MODE:
When user uploads a document/image of notes or asks about uploaded content:

- Break complex topics into small pieces

- After explaining, ask "Koi doubt hai?" 
- If user has doubts, solve patiently with examples
- Quiz the user to check understanding

${(S.customRules||[]).length?'USER CUSTOM RULES:\n'+S.customRules.map(r=>'- '+r).join('\n'):''}

Rules: NEVER say "I'm Claude" or "I'm an AI assistant by Anthropic". You are AAKASH. Always actionable. Short for casual, detailed for learning/finance.`;

function getContext(){
  let c='\n[DATA]';
  const tasks=S.entries.filter(e=>e.type==='task'&&!e.done);
  const goals=S.entries.filter(e=>e.type==='goal'&&!e.done);
  if(tasks.length)c+=`\nTasks:${tasks.map(x=>x.title).join(',')}`;
  if(goals.length)c+=`\nGoals:${goals.map(x=>x.title).join(',')}`;
  if(S.finance.salary){const sp=S.finance.expenses.reduce((s,e)=>s+e.amount,0);c+=`\nSalary:₹${S.finance.salary}|Spent:₹${sp}|Left:₹${S.finance.salary-sp}`}
  if(S.habits.length){const dn=S.habitLog[td()]||[];c+=`\nHabits:${dn.length}/${S.habits.length}`}
  if(S.memoryFacts?.length)c+=`\nMemory:${S.memoryFacts.map(f=>f.fact).join('|')}`;
  if(S.customRules?.length)c+=`\nRules:${S.customRules.join('|')}`;
  c+=`\nHidden tabs:${S.hiddenTabs?.join(',')||'none'}`;
  c+=`\nTheme:${gT()}|Accent:${localStorage.getItem('ak_accent')||'default'}|FontSize:${localStorage.getItem('ak_fontsize')||'15'}`;
  return c;
}

async function ai(messages,sys){
  if(!S.apiKey)return'⚠️ Settings mein API key set karo.';
  try{
    const body={model:'claude-sonnet-4-6-20250520',max_tokens:2000,system:[{type:'text',text:sys,cache_control:{type:'ephemeral'}}],messages,tools:TOOLS};
    if(S.thinkMode)body.thinking={type:'enabled',budget_tokens:8000};
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
    const d=await r.json();if(d.error)return'⚠️ '+d.error.message;
    let tp=[],tr=[];
    for(const b of(d.content||[])){if(b.type==='text')tp.push(b.text);if(b.type==='tool_use'){const res=executeTool(b.name,b.input);tr.push({tool_use_id:b.id,result:res});tp.push(`\n🔧 ${res}`)}}
    if(tr.length&&d.stop_reason==='tool_use'){
      const fu=[...messages,{role:'assistant',content:d.content},{role:'user',content:tr.map(t=>({type:'tool_result',tool_use_id:t.tool_use_id,content:t.result}))}];
      const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6-20250520',max_tokens:1500,system:[{type:'text',text:sys}],messages:fu})});
      const d2=await r2.json();if(!d2.error){const ft=(d2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');if(ft)tp.push(ft)}
      // Re-render after customize_app
      setTimeout(()=>render(),500);
    }
    return tp.join('\n')||'No response.';
  }catch(e){return'⚠️ Network: '+e.message}
}

// ── HELPERS ──
function fmt(t){if(!t)return'';
  return t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre style="background:var(--bg);padding:14px;border-radius:8px;font-size:13px;margin:8px 0;border:1px solid var(--b1);font-family:IBM Plex Mono,monospace;overflow-x:auto;white-space:pre-wrap;line-height:1.6">$2</pre>')
  .replace(/`([^`]+)`/g,'<code style="background:var(--acBg);padding:2px 7px;border-radius:4px;font-size:13px;font-family:IBM Plex Mono,monospace;color:var(--ac)">$1</code>')
  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em style="color:var(--t2)">$1</em>')
  .replace(/^### (.+)$/gm,'<div style="font-size:14px;font-weight:700;color:var(--ac);margin:12px 0 4px">$1</div>')
  .replace(/^## (.+)$/gm,'<div style="font-size:16px;font-weight:700;margin:14px 0 6px">$1</div>')
  .replace(/^- (.+)$/gm,'<div style="padding-left:10px;margin:4px 0;color:var(--t2)">› $1</div>')
  .replace(/🔧 ✅/g,'<span style="background:var(--gBg);color:var(--g);padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;display:inline-block;margin:4px 0;border:1px solid var(--gBorder)">✅')
  .replace(/\n/g,'<br>')}
function INR(n){return'₹'+Number(n||0).toLocaleString('en-IN')}
function td(){return new Date().toISOString().slice(0,10)}

function render(){

let _pv='',_pm='',_ps='';
function rPin(app,mode){_pm=mode;_pv='';_ps='';
  app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:28px">
  <div style="width:68px;height:68px;border-radius:20px;background:var(--grad);display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:glow 3s infinite;font-size:30px;font-weight:800;color:#fff;box-shadow:var(--shadowLg)">A</div>

  </div>

// ── FILE UPLOAD (Image + PDF text extraction) ──
let pendingFile=null;
window.pickFile=function(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,.pdf,.txt,.md';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
    if(f.type.startsWith('image/')){
      const reader=new FileReader();reader.onload=()=>{
        pendingFile={type:'image',data:reader.result,mime:f.type,name:f.name};showFilePreview()};reader.readAsDataURL(f);
    }else if(f.type==='application/pdf'||f.name.endsWith('.pdf')){
      const reader=new FileReader();reader.onload=()=>{
        pendingFile={type:'pdf',data:reader.result,mime:'application/pdf',name:f.name};showFilePreview()};reader.readAsDataURL(f);
    }else{
      const reader=new FileReader();reader.onload=()=>{
        pendingFile={type:'text',data:reader.result,name:f.name};showFilePreview()};reader.readAsText(f);
    }
  };inp.click();
};

function showFilePreview(){
  const prev=document.getElementById('filePreview');if(!prev)return;
  prev.style.display='block';
  prev.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--c2);border-radius:10px;border:1px solid var(--b1)">
    <span style="font-size:22px">${pendingFile.type==='image'?'🖼️':pendingFile.type==='pdf'?'📄':'📝'}</span>
    <span style="font-size:13px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pendingFile.name}</span>
    <button onclick="pendingFile=null;document.getElementById('filePreview').style.display='none'" style="color:var(--r);font-size:16px;padding:4px">✕</button>
  </div>`;
}

window.sendMsg=async function(text){
  const inp=document.getElementById('ci');const content=text||(inp?inp.value.trim():'');
  if(!content&&!pendingFile||loading)return;if(inp)inp.value='';
  const userMsg={role:'user',content:content||'[File uploaded]'};if(pendingFile)userMsg.hasFile=true;
  S.chat.push(userMsg);mc++;loading=true;rChat(document.getElementById('ct'));

  let apiMessages=S.chat.slice(-20).map(m=>{
    if(m===userMsg&&pendingFile){
      if(pendingFile.type==='image'){
        return{role:'user',content:[{type:'image',source:{type:'base64',media_type:pendingFile.mime,data:pendingFile.data.split(',')[1]}},{type:'text',text:content||'Ye notes/image analyze karo. Teacher ki tarah samjhao. Phir doubt poocho.'}]};
      }else if(pendingFile.type==='pdf'){
        return{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pendingFile.data.split(',')[1]}},{type:'text',text:content||'Ye document padho aur teacher ki tarah samjhao. Simple Hinglish mein. Phir doubt poocho.'}]};
      }else{
        return{role:'user',content:content+'\n\n[Uploaded file content]:\n'+pendingFile.data};
      }
    }
    return{role:m.role,content:m.content};
  });

  const reply=await ai(apiMessages,SOUL+getContext());
  pendingFile=null;const fp=document.getElementById('filePreview');if(fp)fp.style.display='none';
  S.chat.push({role:'assistant',content:reply});await saveAll();loading=false;rChat(document.getElementById('ct'));
};

    <div><div style="font-size:17px;font-weight:700">${n.title}</div><div style="font-size:12px;color:var(--ac);font-weight:500">${n.folder}${n.uploaded?' · 📎':''}</div></div>

    ${na?`<div class="cd" style="border-left:3px solid var(--ac);margin-bottom:10px"><div style="font-size:12px;color:var(--ac);font-weight:700;margin-bottom:6px">🎓 AAKASH Teacher</div><div style="font-size:14px;color:var(--t2);line-height:1.7">${fmt(na)}</div></div>`:''}
  </div>
  <div style="padding:10px 16px;border-top:1px solid var(--b1);background:var(--c1);flex-shrink:0">
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      ${['📖 Samjhao','❓ Quiz me','📝 Summary','🤔 Doubt hai'].map(q=>`<button onclick="askNote('${q}')" style="padding:6px 12px;border-radius:20px;background:var(--c2);border:1px solid var(--b1);color:var(--t2);font-size:12px;font-weight:500">${q}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <input id="nQ" class="inp" placeholder="Ask about this note..." onkeydown="if(event.key==='Enter')askNote()" style="border-radius:12px">
      <button onclick="askNote()" id="nAB" class="btn bp" style="flex-shrink:0;border-radius:12px;padding:10px 16px">Ask</button>
    </div>
  </div></div>`}

window.askNote=async function(preset){
  const q=preset||document.getElementById('nQ')?.value?.trim();if(!q||!vn)return;
  const btn=document.getElementById('nAB');if(btn)btn.textContent='...';

  let msgContent;
  if(vn.fileType==='image'&&vn.fileData){
    msgContent=[{type:'image',source:{type:'base64',media_type:vn.fileMime,data:vn.fileData.split(',')[1]}},{type:'text',text:`Note: "${vn.title}"\n\nUser question: ${q}\n\nTeacher mode: Explain in simple Hinglish. Give examples. Ask "koi doubt?" at end.`}];
  }else if(vn.fileType==='pdf'&&vn.fileData){
    msgContent=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:vn.fileData.split(',')[1]}},{type:'text',text:`Note: "${vn.title}"\n\nUser question: ${q}\n\nTeacher mode: Explain in simple Hinglish. Give examples. Ask "koi doubt?" at end.`}];
  }else{
    msgContent=`Note "${vn.title}":\n${vn.content}\n\nQ: ${q}\n\nTeacher mode: Explain simply in Hinglish. Real examples. Ask "koi doubt?" at end.`;
  }

  na=await ai([{role:'user',content:msgContent}],SOUL+'\nYou are a patient teacher/tutor. Explain topics from the uploaded note simply. Use Hinglish. Break complex things into steps. Give examples. After explaining, always ask "Koi doubt hai?" to check understanding.');
  rNV(document.getElementById('ct'));
};

function rHabits(ct){
  const t=td(),done=S.habitLog[t]||[];
  const streak=h=>{let s=0,d=new Date();for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);if((S.habitLog[ds]||[]).includes(h.id))s++;else if(i>0)break;d.setDate(d.getDate()-1)}return s};
  ct.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;padding:10px 16px;min-height:0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
    <div style="font-size:17px;font-weight:700">📅 Habits</div>
    <button onclick="const n=prompt('Habit name:');if(n?.trim()){S.habits.push({id:Date.now(),name:n.trim()});saveAll();rHabits(document.getElementById('ct'))}" class="btn bp" style="padding:8px 16px;font-size:14px">+ Add</button>
  </div>
  <div class="cd" style="text-align:center;margin-bottom:12px;padding:20px;border-left:3px solid ${done.length===S.habits.length&&S.habits.length?'var(--g)':'var(--ac)'}">
    <div style="font-size:14px;color:var(--t3)">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div style="font-size:40px;font-weight:700;color:${done.length===S.habits.length&&S.habits.length?'var(--g)':'var(--t1)'};margin-top:4px">${done.length}<span style="font-size:18px;color:var(--t4)"> / ${S.habits.length}</span></div>
    ${done.length===S.habits.length&&S.habits.length?'<div style="font-size:14px;color:var(--g);margin-top:6px;font-weight:600">🎉 All done!</div>':''}
  </div>
  <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
  ${!S.habits.length?'<div style="text-align:center;padding:30px;color:var(--t4)">Add your first habit!</div>':
  S.habits.map(h=>{const ok=done.includes(h.id),st=streak(h);return`
    <div class="cd" style="display:flex;align-items:center;gap:14px;${ok?'border-color:var(--gBorder)':''}">
      <button onclick="const t=td();if(!S.habitLog[t])S.habitLog[t]=[];const i=S.habitLog[t].indexOf(${h.id});if(i>=0)S.habitLog[t].splice(i,1);else S.habitLog[t].push(${h.id});saveAll();rHabits(document.getElementById('ct'))" style="width:30px;height:30px;border-radius:10px;border:2px solid ${ok?'var(--g)':'var(--b2)'};background:${ok?'var(--g)':'var(--c1)'};color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ok?'✓':''}</button>
      <div style="flex:1"><div style="font-size:15px;font-weight:600;${ok?'color:var(--t3)':''}">${h.name}</div>
      ${st>1?`<div style="font-size:13px;color:var(--y);font-weight:600">🔥 ${st} days</div>`:''}</div>
      <button onclick="if(confirm('Delete?')){S.habits=S.habits.filter(x=>x.id!==${h.id});saveAll();rHabits(document.getElementById('ct'))}" style="color:var(--t4);font-size:16px">✕</button>
    </div>`}).join('')}
  </div></div>`;
}

  <div style="font-size:14px;color:var(--t3)">Sessions: <span style="color:var(--ac);font-weight:700;font-size:18px">${pm.sess}</span></div></div>`}

window.startCall=function(){
  const mood=VOICES[S.voiceMood]||VOICES.rachel;
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="width:88px;height:88px;border-radius:24px;background:var(--grad);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:glow 2s infinite;color:#fff;font-size:32px;font-weight:800;box-shadow:var(--shadowLg)">A</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:4px">AAKASH AI</div>
  <div style="font-size:14px;color:var(--ac);margin-bottom:6px">${mood.label}</div>
  <div id="cTm" style="font-size:32px;font-weight:300;margin-bottom:10px;font-family:IBM Plex Mono,monospace">0:00</div>
  <div id="cSt" style="font-size:15px;color:var(--g);margin-bottom:28px">Connecting...</div>
  <button id="cEd" style="width:64px;height:64px;border-radius:20px;background:var(--r);border:none;color:#fff;font-size:22px;box-shadow:0 4px 24px rgba(220,38,38,.3);display:flex;align-items:center;justify-content:center">📞</button>
  <div style="font-size:13px;color:var(--t4);margin-top:16px">🔒 Encrypted</div>`;
  document.body.appendChild(ov);
  let dur=0,alive=true,rec;
  const tmr=setInterval(()=>{dur++;const t=ov.querySelector('#cTm');if(t)t.textContent=`${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`},1000);
  const end=()=>{alive=false;clearInterval(tmr);speechSynthesis?.cancel();try{rec?.stop()}catch{}ov.remove()};
  ov.querySelector('#cEd').onclick=end;
  const speak=(text,cb)=>{ov.querySelector('#cSt').textContent='Speaking...';ov.querySelector('#cSt').style.color='var(--ac)';const clean=text.replace(/[\u{1F300}-\u{1FAD6}\u{2600}-\u{27BF}∞₹🔧]/gu,'').replace(/<[^>]*>/g,'').replace(/\*+/g,'').replace(/#+/g,'').replace(/→|›/g,'').replace(/```[\s\S]*?```/g,'').trim();if(!clean){cb?.();return}
    if(S.elKey&&mood.elId){fetch(`https://api.elevenlabs.io/v1/text-to-speech/${mood.elId}`,{method:'POST',headers:{'Content-Type':'application/json','xi-api-key':S.elKey},body:JSON.stringify({text:clean.slice(0,500),model_id:'eleven_multilingual_v2',voice_settings:{stability:.5,similarity_boost:.75}})}).then(r=>{if(!r.ok)throw 0;return r.blob()}).then(b=>{const u=URL.createObjectURL(b),a=new Audio(u);a.onended=()=>{URL.revokeObjectURL(u);if(alive)cb?.()};a.onerror=()=>{URL.revokeObjectURL(u);fbS(clean,cb)};a.play().catch(()=>fbS(clean,cb))}).catch(()=>fbS(clean,cb));return}fbS(clean,cb)};
  const fbS=(c,cb)=>{if(!speechSynthesis){cb?.();return}speechSynthesis.cancel();const sn=c.match(/[^.!?।]+[.!?।]*/g)||[c];let i=0;const nx=()=>{if(i>=sn.length||!alive){cb?.();return}const s=sn[i].trim();i++;if(!s){nx();return}const u=new SpeechSynthesisUtterance(s);const v=speechSynthesis.getVoices();let hv=v.find(x=>x.name.includes('Google')&&x.lang.startsWith('hi'))||v.find(x=>x.lang.startsWith('hi'))||v.find(x=>x.lang==='en-IN')||v[0];if(hv)u.voice=hv;u.lang=hv?.lang||'hi-IN';u.pitch=mood.pitch;u.rate=mood.rate;u.onend=()=>{if(alive)nx()};u.onerror=()=>{if(alive)nx()};speechSynthesis.speak(u)};nx()};
  const listen=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;rec=new SR();rec.lang='hi-IN';rec.continuous=true;rec.interimResults=true;let final='',st=null;ov.querySelector('#cSt').textContent='Listening...';ov.querySelector('#cSt').style.color='var(--g)';
    rec.onresult=e=>{let im='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';else im+=e.results[i][0].transcript}if(final||im){ov.querySelector('#cSt').textContent='"'+(final+im).slice(-50)+'"';ov.querySelector('#cSt').style.color='var(--t1)'}clearTimeout(st);if(final.trim())st=setTimeout(()=>{try{rec.stop()}catch{}},2000)};
    rec.onend=async()=>{clearTimeout(st);if(final.trim()&&alive){ov.querySelector('#cSt').textContent='Thinking...';ov.querySelector('#cSt').style.color='var(--y)';const reply=await ai([...S.chat.slice(-10),{role:'user',content:final.trim()}],SOUL+getContext()+'\nVoice. SHORT (2-3 sentences). No formatting.');S.chat.push({role:'user',content:final.trim()},{role:'assistant',content:reply});await saveAll();final='';if(reply&&alive&&!reply.startsWith('⚠️'))speak(reply,()=>{if(alive)listen()});else if(alive)setTimeout(()=>{if(alive)listen()},2000)}else if(alive)setTimeout(()=>{if(alive)listen()},500)};
    rec.onerror=e=>{if(e.error==='no-speech'&&alive)setTimeout(()=>{if(alive)listen()},500);else if(alive)setTimeout(listen,1000)};try{rec.start()}catch{setTimeout(()=>{if(alive)listen()},2000)}};
  if(speechSynthesis.getVoices().length===0)speechSynthesis.onvoiceschanged=()=>{if(alive)speak('Haan boliye, kya help chahiye?',()=>{if(alive)listen()})};
  else setTimeout(()=>{if(alive)speak('Haan boliye, kya help chahiye?',()=>{if(alive)listen()})},500);
};

// ═══ SETTINGS ═══
window.openSettings=function(){
  const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;z-index:100;background:var(--overlay);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s';
  ov.innerHTML=`<div style="background:var(--c1);border-radius:20px;padding:24px;max-width:360px;width:100%;border:1px solid var(--b1);max-height:90vh;overflow-y:auto;box-shadow:var(--shadowLg)">
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">⚙️ Settings</div>

  <div style="padding:14px;background:var(--bg);border-radius:12px;border:1px solid var(--b1);margin-bottom:14px;font-size:14px;color:var(--t2);line-height:2">
    📦 ${S.entries.length} entries · 📝 ${S.notes.length} notes · 📅 ${S.habits.length} habits<br>
    💬 ${S.chat.length} msgs · 💰 ${S.finance.expenses.length} expenses<br>
    🧠 ${S.memoryFacts?.length||0} memories · 💾 ${formatBytes(getStorageSize())}
  </div>

  <!-- THEME -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">Theme</div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    <button onclick="sT('light');this.closest('div[style*=fixed]').remove();render();openSettings()" style="flex:1;padding:10px;border-radius:8px;background:${gT()==='light'?'var(--acBg2)':'var(--c2)'};border:1.5px solid ${gT()==='light'?'var(--acBorder)':'var(--b1)'};color:${gT()==='light'?'var(--ac)':'var(--t3)'};font-weight:600;font-size:14px">☀️ Light</button>
    <button onclick="sT('dark');this.closest('div[style*=fixed]').remove();render();openSettings()" style="flex:1;padding:10px;border-radius:8px;background:${gT()==='dark'?'var(--acBg2)':'var(--c2)'};border:1.5px solid ${gT()==='dark'?'var(--acBorder)':'var(--b1)'};color:${gT()==='dark'?'var(--ac)':'var(--t3)'};font-weight:600;font-size:14px">🌙 Dark</button>
  </div>

  <!-- ACCENT COLOR -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">Accent Color</div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  ${['#c2410c','#2563eb','#7c3aed','#16a34a','#dc2626','#ca8a04','#0891b2','#be185d'].map(c=>`<button onclick="localStorage.setItem('ak_accent','${c}');applyCustom();this.closest('div[style*=fixed]').remove();render();openSettings()" style="width:36px;height:36px;border-radius:10px;background:${c};border:3px solid ${localStorage.getItem('ak_accent')===c||(!localStorage.getItem('ak_accent')&&c==='#c2410c')?'var(--t1)':'transparent'}"></button>`).join('')}
  </div>

  <!-- FONT SIZE -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">Font Size</div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
  ${[{v:'13',l:'Small'},{v:'15',l:'Medium'},{v:'17',l:'Large'}].map(f=>`<button onclick="localStorage.setItem('ak_fontsize','${f.v}');applyCustom();this.closest('div[style*=fixed]').remove();render();openSettings()" style="flex:1;padding:8px;border-radius:8px;background:${(localStorage.getItem('ak_fontsize')||'15')===f.v?'var(--acBg2)':'var(--c2)'};border:1.5px solid ${(localStorage.getItem('ak_fontsize')||'15')===f.v?'var(--acBorder)':'var(--b1)'};color:${(localStorage.getItem('ak_fontsize')||'15')===f.v?'var(--ac)':'var(--t3)'};font-size:13px;font-weight:600">${f.l}</button>`).join('')}
  </div>

  <!-- VISIBLE TABS -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">Visible Tabs</div>
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
  ${['vault','notes','finance','habits','timer','create'].map(t=>{const hidden=(S.hiddenTabs||[]).includes(t);return`<button onclick="if(${hidden}){S.hiddenTabs=S.hiddenTabs.filter(x=>x!=='${t}')}else{S.hiddenTabs.push('${t}')}saveAll();this.closest('div[style*=fixed]').remove();render();openSettings()" style="padding:6px 14px;border-radius:24px;background:${hidden?'var(--rBg)':'var(--gBg)'};border:1px solid ${hidden?'var(--rBorder)':'var(--gBorder)'};color:${hidden?'var(--r)':'var(--g)'};font-size:12px;font-weight:600">${hidden?'✕':'✓'} ${t}</button>`}).join('')}
  </div>

  <!-- CUSTOM RULES -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">Custom AI Rules (${(S.customRules||[]).length})</div>
  <div style="margin-bottom:6px">
  ${(S.customRules||[]).map((r,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:13px;color:var(--t2)"><span>→ ${r}</span><button onclick="S.customRules.splice(${i},1);saveAll();this.closest('div[style*=fixed]').remove();openSettings()" style="color:var(--r);font-size:12px;font-weight:600">✕</button></div>`).join('')||'<div style="font-size:12px;color:var(--t4);padding:4px">No custom rules. Chat mein bolo "add rule: always reply in Hindi"</div>'}
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px">
    <input id="newRule" class="inp" placeholder="Add custom rule..." style="font-size:13px">
    <button onclick="const r=document.getElementById('newRule').value.trim();if(r){if(!S.customRules)S.customRules=[];S.customRules.push(r);saveAll();this.closest('div[style*=fixed]').remove();openSettings()}" class="btn bp" style="padding:8px 14px;font-size:13px;flex-shrink:0">Add</button>
  </div>

  <!-- MEMORIES -->
  ${S.memoryFacts?.length?`<div style="font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600">🧠 Memories (${S.memoryFacts.length})</div>
  <div style="padding:8px;background:var(--bg);border-radius:8px;margin-bottom:14px;max-height:100px;overflow-y:auto;border:1px solid var(--b1)">
  ${S.memoryFacts.map((f,i)=>`<div style="font-size:13px;color:var(--t2);margin-bottom:4px;display:flex;justify-content:space-between;gap:8px"><span>→ ${f.fact}</span><button onclick="S.memoryFacts.splice(${i},1);saveAll();this.closest('div[style*=fixed]').remove();openSettings()" style="color:var(--r);font-size:12px;flex-shrink:0">✕</button></div>`).join('')}
  </div>`:''}

  <!-- API KEYS -->
  <div style="font-size:13px;color:var(--t2);margin-bottom:4px;font-weight:600">API Key</div>
  <div style="display:flex;gap:6px;margin-bottom:8px"><input id="sK" class="inp" value="${S.apiKey}" style="font-size:12px;font-family:IBM Plex Mono,monospace"><button onclick="S.apiKey=document.getElementById('sK').value.trim();saveAll();alert('✅')" class="btn bp" style="padding:8px 12px;font-size:12px;flex-shrink:0">Save</button></div>
  <div style="font-size:13px;color:var(--t2);margin-bottom:4px;font-weight:600">ElevenLabs Key</div>
  <div style="display:flex;gap:6px;margin-bottom:14px"><input id="sEL" class="inp" value="${S.elKey||''}" placeholder="xi-..." style="font-size:12px;font-family:IBM Plex Mono,monospace"><button onclick="S.elKey=document.getElementById('sEL').value.trim();saveAll();alert('✅')" class="btn bp" style="padding:8px 12px;font-size:12px;flex-shrink:0">Save</button></div>

  <!-- DATA INFO -->
  <div style="padding:12px;background:var(--yBg);border-radius:8px;border:1px solid rgba(202,138,4,.2);margin-bottom:14px;font-size:12px;color:var(--t2);line-height:1.7">
    <strong>📍 Data Location:</strong> Browser localStorage on this device. AES-256 encrypted. Export backups regularly!
  </div>

  <!-- ACTIONS -->
  <div style="display:flex;flex-direction:column;gap:8px">
    <button onclick="const d=JSON.stringify(S);const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='aakash-backup-'+td()+'.json';a.click();URL.revokeObjectURL(u)" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--gBorder);background:var(--gBg);color:var(--g);font-size:14px;font-weight:600">📥 Export Backup</button>
    <button onclick="const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);if(confirm('Replace data?')){S={...S,...d};await saveAll();alert('✅');render()}}catch{alert('❌ Invalid')}};r.readAsText(f)};i.click()" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--acBorder);background:var(--acBg);color:var(--ac);font-size:14px;font-weight:600">📤 Import Backup</button>
    <button onclick="S.chat=[];mc=0;saveAll();alert('✅')" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--b1);background:var(--c2);color:var(--t2);font-size:14px;font-weight:600">🗑️ Clear Chat</button>
    <button onclick="_ck=null;this.closest('div[style*=fixed]').remove();render()" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--b1);background:var(--c2);color:var(--t2);font-size:14px;font-weight:600">🔒 Lock App</button>
    <button onclick="if(confirm('⚠️ DELETE ALL DATA?')){localStorage.clear();location.reload()}" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--rBorder);background:var(--rBg);color:var(--r);font-size:14px;font-weight:600">⚠️ Wipe All</button>
  </div>
  <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;margin-top:12px;padding:12px;border-radius:10px;background:var(--bg);color:var(--t3);font-size:14px;font-weight:600;border:1px solid var(--b1)">Close</button>
  </div>`;
  document.body.appendChild(ov);
};

// ═══ INIT ═══
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
render();
</script>
